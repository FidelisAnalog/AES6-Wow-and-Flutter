name: Deploy to myhi.fi

on:
  push:
    branches: [production, test, preview]
  workflow_dispatch:

concurrency:
  group: deploy-myhi-fi
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build production → output/wow/
      - uses: actions/checkout@v4
        with:
          ref: production
          path: prod-src
      - name: Build production
        run: |
          cd prod-src/spa && npm ci && npx vite build --base /wow/
          mkdir -p $GITHUB_WORKSPACE/output/wow
          cp -r dist/* $GITHUB_WORKSPACE/output/wow/
          mkdir -p $GITHUB_WORKSPACE/output/wow/python
          cp $GITHUB_WORKSPACE/prod-src/wf_core.py $GITHUB_WORKSPACE/output/wow/python/wf_core.py

      # Build test → output/wow/test/ (skip if branch doesn't exist)
      - name: Check for test branch
        id: check-test
        run: |
          if git ls-remote --heads origin test | grep -q test; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        working-directory: prod-src

      - uses: actions/checkout@v4
        if: steps.check-test.outputs.exists == 'true'
        with:
          ref: test
          path: test-src

      - name: Build test
        if: steps.check-test.outputs.exists == 'true'
        run: |
          cd test-src/spa && npm ci && npx vite build --base /wow/test/
          mkdir -p $GITHUB_WORKSPACE/output/wow/test
          cp -r dist/* $GITHUB_WORKSPACE/output/wow/test/
          mkdir -p $GITHUB_WORKSPACE/output/wow/test/python
          cp $GITHUB_WORKSPACE/test-src/wf_core.py $GITHUB_WORKSPACE/output/wow/test/python/wf_core.py

      # Build preview → output/wow/preview/ (skip if branch doesn't exist)
      - name: Check for preview branch
        id: check-preview
        run: |
          if git ls-remote --heads origin preview | grep -q preview; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        working-directory: prod-src

      - uses: actions/checkout@v4
        if: steps.check-preview.outputs.exists == 'true'
        with:
          ref: preview
          path: preview-src

      - name: Build preview
        if: steps.check-preview.outputs.exists == 'true'
        run: |
          cd preview-src/spa && npm ci && npx vite build --base /wow/preview/
          mkdir -p $GITHUB_WORKSPACE/output/wow/preview
          cp -r dist/* $GITHUB_WORKSPACE/output/wow/preview/
          mkdir -p $GITHUB_WORKSPACE/output/wow/preview/python
          cp $GITHUB_WORKSPACE/preview-src/wf_core.py $GITHUB_WORKSPACE/output/wow/preview/python/wf_core.py

      # Deploy everything atomically
      - name: Deploy to pages repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: FidelisAnalog/myhi.fi
          publish_dir: output
          keep_files: false
          cname: myhi.fi
