name: Deploy to myhi.fi

on:
  push:
    branches:
      - production
      - test
      - preview

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine deploy path
        id: path
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [ "$BRANCH" = "production" ]; then
            echo "dest=wow" >> "$GITHUB_OUTPUT"
            echo "base=/wow/" >> "$GITHUB_OUTPUT"
          elif [ "$BRANCH" = "test" ]; then
            echo "dest=wow/test" >> "$GITHUB_OUTPUT"
            echo "base=/wow/test/" >> "$GITHUB_OUTPUT"
          elif [ "$BRANCH" = "preview" ]; then
            echo "dest=wow/preview" >> "$GITHUB_OUTPUT"
            echo "base=/wow/preview/" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build
        working-directory: spa
        run: |
          npm ci
          npx vite build --base ${{ steps.path.outputs.base }}

      - name: Copy wf_core.py to dist
        run: |
          mkdir -p spa/dist/python
          cp wf_core.py spa/dist/python/wf_core.py

      - name: Deploy to pages repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: FidelisAnalog/myhi.fi
          publish_dir: spa/dist
          destination_dir: ${{ steps.path.outputs.dest }}
          keep_files: true
          cname: myhi.fi
